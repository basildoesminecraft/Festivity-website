        .tv-box::before {

            left: 0;

                rgba(0,0,0,0.2) 0px,

                transparent 2px,
                transparent 4px
            );

            z-index: 5;
            border-radius: 8px;

        .tv-box::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

                circle at 30% 40%,
                rgba(0, 80, 0, 0.12) 0%,

<body>

<div class="minecraft-container">

    <div class="two-columns">
        

        <div class="billboard" id="billboard">
            <div class="billboard-title">★ SUPPORTERS ★</div>
            <div style="text-align: center; font-size: 0.67rem; color: #aaaaaa; margin-bottom: 10px;">Updated by hand every week</div>
            <div id="billboardContent">
                <div class="billboard-loading">LOADING...</div>
            </div>
        </div>


        <div class="gallery-area">
            <div class="tv-box">
                <div class="top-bezel-extend"></div>
                <div class="screen-glare"></div>
            
 
                <div class="top-bezel-buttons">
                    <a href="https://ko-fi.com/basilkofi" target="_blank" class="donate-btn-bezel" id="donateBtn">SUPPORT / DONATE</a>
                    <a href="https://ko-fi.com/basilkofi/commissions" target="_blank" class="commission-btn-bezel" id="commissionBtn">+ COMMISSION FOR THIS RESOURCE PACK</a>
                </div>
                

                <div class="bedrock-header">
                    <div class="logo-area">
                        <img src="Festivity.png" class="logo-placeholder" style="width: 75px; height: 75px; object-fit: contain;">
                        <div class="logo-text">FESTIVITY GALLERY</div>
                    </div>
                </div>


                <div class="categories" id="categoryFilter"></div>


                <div id="galleryGrid" class="image-grid">
                    <div class="loading">LOADING GALLERY...</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== GALLERY (from gallery.txt) ==========
    let galleryItems = [];
    let currentCategory = "all";
    let categoriesOrder = [];

    async function loadGallery() {
        try {
            const response = await fetch('gallery.txt');
            if (!response.ok) {
                throw new Error(`Failed to load gallery.txt: ${response.status}`);
            }
            const text = await response.text();
            parseGalleryText(text);
        } catch (error) {
            console.error('Error loading gallery:', error);
            document.getElementById('galleryGrid').innerHTML = `<div class="error">ERROR: Could not load gallery.txt<br><br>Make sure the file exists in the same folder as this HTML file.</div>`;
            document.getElementById('categoryFilter').innerHTML = `<div class="error">Failed to load categories</div>`;
        }
    }

    function parseGalleryText(text) {
        const lines = text.split(/\r?\n/);
        
        let realsPath = "";
        let currentCategoryName = "";
        let currentCategoryPath = "";
        let currentFit = "cover";
        
        galleryItems = [];
        categoriesOrder = [];
        
        for (let line of lines) {
            line = line.trim();
            if (line === "") continue;
            
            if (line.startsWith(">>REALS:")) {
                realsPath = line.substring(8).trim();
                continue;
            }
            
            if (line.startsWith(">>CATEGORY:")) {
                currentCategoryName = line.substring(11).trim();
                categoriesOrder.push(currentCategoryName);
                continue;
            }
            
            if (line.startsWith(">>PATH:")) {
                currentCategoryPath = line.substring(7).trim();
                continue;
            }
            
            if (line.startsWith(">>FIT:")) {
                currentFit = line.substring(6).trim().toLowerCase();
                continue;
            }
            
            if (line.includes("|") && currentCategoryName && currentCategoryPath) {
                const parts = line.split("|");
                const mainImageFile = parts[0].trim();
                const overlayImageFile = parts[1].trim();
                let caption = parts[2] ? parts[2].trim() : mainImageFile.replace(/\.png$/i, "").replace(/\.jpg$/i, "").replace(/\.jpeg$/i, "");
                
                const mainImg = currentCategoryPath + encodeURIComponent(mainImageFile).replace(/%20/g, "%20");
                const overlayImg = realsPath + encodeURIComponent(overlayImageFile).replace(/%20/g, "%20");
                
                galleryItems.push({
                    mainImg: mainImg,
                    caption: caption,
                    category: currentCategoryName,
                    fit: currentFit,
                    overlayImg: overlayImg
                });
            }
        }
        
        if (galleryItems.length === 0) {
            document.getElementById('galleryGrid').innerHTML = `<div class="error">ERROR: No items found in gallery.txt<br><br>Check the file format.</div>`;
            document.getElementById('categoryFilter').innerHTML = `<div class="error">No categories loaded</div>`;
            return;
        }
        
        buildCategoryButtons();
        renderGallery();
    }
    
    function buildCategoryButtons() {
        const categoryContainer = document.getElementById('categoryFilter');
        
        const categoryCounts = {};
        for (let item of galleryItems) {
            categoryCounts[item.category] = (categoryCounts[item.category] || 0) + 1;
        }
        
        let html = `<button class="cat-btn active" data-cat="all">ALL (${galleryItems.length})</button>`;
        
        for (let catName of categoriesOrder) {
            const count = categoryCounts[catName] || 0;
            html += `<button class="cat-btn" data-cat="${catName}">${catName.toUpperCase()} (${count})</button>`;
        }
        
        categoryContainer.innerHTML = html;
        
        const buttons = document.querySelectorAll('.cat-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.getAttribute('data-cat');
                renderGallery();
            });
        });
    }
    
    function renderGallery() {
        const gridContainer = document.getElementById('galleryGrid');
        
        const filteredItems = currentCategory === "all" 
            ? galleryItems 
            : galleryItems.filter(item => item.category === currentCategory);
        
        if (filteredItems.length === 0) {
            gridContainer.innerHTML = `<div class="no-match">NO ITEMS IN THIS CATEGORY</div>`;
            return;
        }
        
        let html = '';
        for (let item of filteredItems) {
            const fitStyle = item.fit === "contain" ? "object-fit: contain;" : "object-fit: cover;";
            html += `
                <div class="item-card">
                    <div class="image-wrapper">
                        <img class="item-img" src="${item.mainImg}" alt="${item.caption}" loading="lazy" style="${fitStyle} background: #1e1e1f;" onerror="this.src='https://via.placeholder.com/150/313233/ffffff?text=NO+IMG'">
                        <img class="overlay-img" src="${item.overlayImg}" alt="real item" onerror="this.style.display='none'">
                    </div>
                    <div class="item-text">${item.caption}</div>
                </div>
            `;
        }
        gridContainer.innerHTML = html;
    }

    // ========== BILLBOARD (from billboard.txt) ==========
    function applyColorTags(text) {

        while (text.includes('[link=')) {
            let start = text.indexOf('[link=');
            let end = text.indexOf('[/link]', start);
            if (end === -1) break;
            let linkPart = text.substring(start + 6, text.indexOf(']', start));
            let content = text.substring(text.indexOf(']', start) + 1, end);
            let replacement = '<a href="' + linkPart + '" class="billboard-link" target="_blank" rel="noopener noreferrer">' + content + '</a>';
            text = text.substring(0, start) + replacement + text.substring(end + 7);
        }
        

        while (text.includes('[size=')) {
            let start = text.indexOf('[size=');
            let end = text.indexOf('[/size]', start);
            if (end === -1) break;
            let sizeValue = text.substring(start + 6, text.indexOf(']', start));
            let content = text.substring(text.indexOf(']', start) + 1, end);
            let replacement = '<span style="font-size: ' + sizeValue + 'rem;">' + content + '</span>';
            text = text.substring(0, start) + replacement + text.substring(end + 7);
        }
        

        let sizePresets = ['xs', 'sm', 'md', 'lg', 'xl'];
        for (let size of sizePresets) {
            let searchOpen = '[size-' + size + ']';
            let searchClose = '[/size-' + size + ']';
            while (text.includes(searchOpen)) {
                let start = text.indexOf(searchOpen);
                let end = text.indexOf(searchClose, start);
                if (end === -1) break;
                let content = text.substring(start + searchOpen.length, end);
                let replacement = '<span class="text-' + size + '">' + content + '</span>';
                text = text.substring(0, start) + replacement + text.substring(end + searchClose.length);
            }
        }
        

        while (text.includes('[rainbow]')) {
            let start = text.indexOf('[rainbow]');
            let end = text.indexOf('[/rainbow]', start);
            if (end === -1) break;
            let content = text.substring(start + 9, end);
            let replacement = '<span class="rainbow">' + content + '</span>';
            text = text.substring(0, start) + replacement + text.substring(end + 10);
        }
        

        while (text.includes('[blink]')) {
            let start = text.indexOf('[blink]');
            let end = text.indexOf('[/blink]', start);
            if (end === -1) break;
            let content = text.substring(start + 7, end);
            let replacement = '<span class="blink">' + content + '</span>';
            text = text.substring(0, start) + replacement + text.substring(end + 8);
        }
        

        while (text.includes('[glow]')) {
            let start = text.indexOf('[glow]');
            let end = text.indexOf('[/glow]', start);
            if (end === -1) break;
            let content = text.substring(start + 6, end);
            let replacement = '<span class="glow">' + content + '</span>';
            text = text.substring(0, start) + replacement + text.substring(end + 7);
        }
        

        let colors = ['gold', 'red', 'green', 'blue', 'pink', 'white', 'gray'];
        for (let color of colors) {
            let searchOpen = '[color-' + color + ']';
            let searchClose = '[/color-' + color + ']';
            while (text.includes(searchOpen)) {
                let start = text.indexOf(searchOpen);
                let end = text.indexOf(searchClose, start);
                if (end === -1) break;
                let content = text.substring(start + searchOpen.length, end);
                let replacement = '<span class="color-' + color + '">' + content + '</span>';
                text = text.substring(0, start) + replacement + text.substring(end + searchClose.length);
            }
        }
        
        return text;
    }
    
    async function loadBillboard() {
        const billboardDiv = document.getElementById('billboardContent');
        try {
            const response = await fetch('billboard.txt');
            if (!response.ok) {
                billboardDiv.innerHTML = `<div class="billboard-error">No billboard.txt found</div>`;
                return;
            }
            const text = await response.text();
            parseBillboardText(text, billboardDiv);
        } catch (error) {
            console.error('Error loading billboard:', error);
            billboardDiv.innerHTML = `<div class="billboard-error">Could not load billboard.txt</div>`;
        }
    }

    function parseBillboardText(text, container) {
        const lines = text.split(/\r?\n/);
        let html = '';
        let currentSection = '';
        
        for (let line of lines) {
            line = line.trim();
            if (line === "") continue;
            
            if (line.startsWith(">>SECTION:")) {
                if (currentSection) {
                    html += `</div>`;
                }
                currentSection = line.substring(10).trim();
                html += `<div class="billboard-section">`;
                html += `<div class="section-header">${currentSection.toUpperCase()}</div>`;
                continue;
            }
            
            if (currentSection && line) {
                if (line.includes("|")) {
                    const parts = line.split("|");
                    let name = parts[0].trim();
                    let amount = parts[1] ? parts[1].trim() : "";
                    let message = parts[2] ? parts[2].trim() : "";
                    
                    name = applyColorTags(name);
                    amount = applyColorTags(amount);
                    message = applyColorTags(message);
                    
                    html += `<div class="billboard-entry">`;
                    html += `<span class="entry-name">${name}</span>`;
                    if (amount) html += ` <span class="entry-amount">${amount}</span>`;
                    if (message) html += `<div class="entry-message">"${message}"</div>`;
                    html += `</div>`;
                } else {
                    let formattedLine = applyColorTags(line);
                    html += `<div class="billboard-entry">${formattedLine}</div>`;
                }
            }
        }
        
        if (currentSection) {
            html += `</div>`;
        }
        
        if (html === "") {
            container.innerHTML = `<div class="billboard-error">No entries found</div>`;
        } else {
            container.innerHTML = html;
        }
    }


    function setupButtons() {
        const commissionBtn = document.getElementById('commissionBtn');
        const donateBtn = document.getElementById('donateBtn');
        
        // Links are already set in HTML, no need to override
    }

    function setupAnimatedCursor() {
        const bezelButtons = document.querySelectorAll('.donate-btn-bezel, .commission-btn-bezel');
        if (bezelButtons.length === 0) return;
        
        let frameIndex = 0;
        const cursorFrames = [
            'url("cursor_yesplease1.png") 16 16',
            'url("cursor_yesplease2.png") 16 16'
        ];
        
        setInterval(() => {
            frameIndex = (frameIndex + 1) % cursorFrames.length;
            bezelButtons.forEach(btn => {
                btn.style.cursor = cursorFrames[frameIndex] + ', pointer';
            });
        }, 150); // Change frame every 150ms (adjust for speed)
    }
    
    // Load everything
    loadGallery();
    loadBillboard();
    setupButtons();
    setupAnimatedCursor();
</script>
